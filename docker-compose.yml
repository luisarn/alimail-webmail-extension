# Alimail Reply Generator - Docker Compose
# Run the email reply generation server with Docker

services:
  reply-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alimail-reply-generator
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      # LLM Configuration - adjust these to match your setup
      - LLM_URL=http://host.docker.internal:4000
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"
